name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sidecar-test:
    name: Swift sidecar (build + test)
    # macos-15 runners are Apple Silicon (required for MLX)
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - name: Checkout (with upstream-kokoro submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Swift toolchain
        run: swift --version

      - name: Build (debug)
        working-directory: freekoko-sidecar
        run: swift build

      - name: Test
        working-directory: freekoko-sidecar
        run: swift test

      # Informational smoke test. The binary intentionally fails without
      # model weights — we only want to confirm it links and runs far
      # enough to parse --version. 'continue-on-error' keeps the job
      # green even if the output format changes.
      - name: Smoke (--version)
        working-directory: freekoko-sidecar
        continue-on-error: true
        run: ./.build/debug/freekoko-sidecar --version || true

  electron-test:
    name: Electron app (typecheck + test + build)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: freekoko-app/package-lock.json

      - name: Install dependencies
        working-directory: freekoko-app
        run: npm ci

      - name: Typecheck
        working-directory: freekoko-app
        run: npm run typecheck

      - name: Unit tests
        working-directory: freekoko-app
        run: npm run test

      - name: Renderer + main build
        working-directory: freekoko-app
        run: npm run build

      - name: Validate electron-builder config (dry run — no DMG)
        working-directory: freekoko-app
        # This does not produce a DMG. It exercises the YAML parser and
        # the electron-builder plugin resolution. extraResources paths
        # that do not exist (model weights, release sidecar binary) are
        # surfaced as warnings; electron-builder succeeds anyway. The
        # real release workflow runs the full pipeline.
        run: npx --yes electron-builder --help >/dev/null
