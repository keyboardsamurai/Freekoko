name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sidecar-test:
    name: Swift sidecar (build + test)
    # macos-15 runners are Apple Silicon (required for MLX)
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - name: Checkout (with upstream-kokoro submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show Swift toolchain
        run: swift --version

      - name: Build (debug)
        working-directory: freekoko-sidecar
        run: swift build

      - name: Test
        working-directory: freekoko-sidecar
        run: swift test

      # Informational smoke test. The binary intentionally fails without
      # model weights — we only want to confirm it links and runs far
      # enough to parse --version. 'continue-on-error' keeps the job
      # green even if the output format changes.
      - name: Smoke (--version)
        working-directory: freekoko-sidecar
        continue-on-error: true
        run: ./.build/debug/freekoko-sidecar --version || true

  electron-test:
    name: Electron app (typecheck + test + build)
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: freekoko-app/package-lock.json

      - name: Install dependencies
        working-directory: freekoko-app
        run: npm ci

      - name: Lint
        working-directory: freekoko-app
        # eslint --max-warnings 0; the "|| true" swallow has been removed
        # from package.json so a real lint failure now breaks the job.
        run: npm run lint

      - name: Typecheck
        working-directory: freekoko-app
        run: npm run typecheck

      - name: Unit tests
        working-directory: freekoko-app
        run: npm run test

      - name: Renderer + main build
        working-directory: freekoko-app
        run: npm run build

  package-smoke:
    name: Packaging smoke (make dmg-dir)
    # macos-15 runners are Apple Silicon (required for MLX + arm64-only app)
    runs-on: macos-15
    timeout-minutes: 40
    needs: [sidecar-test, electron-test]
    steps:
      - name: Checkout (with upstream-kokoro submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: freekoko-app/package-lock.json

      - name: Verify host prerequisites
        run: make check-deps

      # Unlike the release pipeline, we skip `make download-models` — the
      # dmg-dir target (npm run package:mac:dir) produces an unpacked .app
      # and does not require weights on disk. electron-builder emits
      # warnings for the missing extraResources; the smoke is still a
      # real exercise of sidecar build + electron-builder packaging.
      - name: Build Swift sidecar (release arm64)
        run: make sidecar

      - name: Package unpacked .app (no DMG, no model weights)
        run: make dmg-dir

      - name: Verify packaged .app structure
        run: |
          APP="freekoko-app/dist/mac-arm64/freekoko.app"
          test -d "$APP" || { echo "ERROR: unpacked .app missing at $APP"; exit 1; }
          test -x "$APP/Contents/Resources/sidecar/freekoko-sidecar" || \
            { echo "ERROR: sidecar binary missing inside .app"; exit 1; }
          test -f "$APP/Contents/Resources/sidecar/mlx.metallib" || \
            { echo "ERROR: mlx.metallib missing next to sidecar"; exit 1; }
